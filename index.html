<!DOCTYPE html>
<html>
    <head>
        <title>Trenton Soto's Links Project</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="assets/reset.css" rel="stylesheet">
        <link href="assets/style.css" rel="stylesheet">
        <script defer src="assets/arena.js"></script>
        <script defer src="assets/script.js"></script>
        <!-- dirty baker's font -->
        <link rel="stylesheet" href="https://use.typekit.net/ion5quv.css">
        <!-- vandertak font -->
         <link rel="stylesheet" href="https://use.typekit.net/ion5quv.css">
    </head>

    <body>
        <nav>
            <ul>
                <li><button id="show-all" class="button active">ALL</button></li>
                <li><button id="show-links" class="button">LINKS</button></li>
                <li><button id="show-images" class="button">IMAGES</button></li>
                <li><button id="show-videos" class="button">VIDEOS</button></li>
                <li><button id="show-text" class="button">TEXT</button></li>
            </ul>
        </nav>

		<header>
            <section class="heading-section">
                <section class="title">
                    <span class="year">1998 - COLLECTION SERIES</span>
                    <h1 id="channel-title"></h1>
                    <p class="arena-link"><a id="channel-link">See the collection on Are.na ↗</a></p>
                </section>
                <section class="header-stats">
                    <section class="stats">
                        <span class="heading-label">CARDS</span>
                        <p><span id="channel-count"></span> cards</p>
                    </section>
                    <section class="stats">
                        <span class="heading-label">ABOUT</span>
                        <span id="channel-description"></span>
                    </section>
                </section>
            </section>
		</header>

		<main>
			<section class="cards">
				<ul id="channel-blocks"></ul>
				<p><span id="channel-count"></span></p>
			</section>
		</main>

        <!-- from intro to javascript week 17 -->
        <!-- I used this setup to build my card modal -->
        <dialog id="card-modal">
            <button id="close-modal">x</button>
            <div id="modal-content"></div>
        </dialog>
        <!-- from intro to javascript week 17 -->

		<footer>
            <section class="footer">
                <div class="footer-info">Inspired by Basketball - Collection Series</div>
                <div id="channel-users"></div>
            </section>
		</footer>
	</body>
</html>
