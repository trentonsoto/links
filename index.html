<!DOCTYPE html>
<html>
    <head>
        <title>Trenton Soto's Links Project</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="assets/reset.css" rel="stylesheet">
        <link href="assets/style.css" rel="stylesheet">
        <script defer src="assets/arena.js"></script>
        <script defer src="assets/script.js"></script>
        <!-- dirty baker's font -->
        <link rel="stylesheet" href="https://use.typekit.net/ion5quv.css">
        <!-- vandertak font -->
         <link rel="stylesheet" href="https://use.typekit.net/ion5quv.css">
    </head>

    <body>
        <nav>
            <ul>
                <li><button class="button active">ALL</button></li>
                <li><button class="button">LINKS</button></li>
                <li><button class="button">IMAGES</button></li>
                <li><button class="button">VIDEOS</button></li>
                <li><button class="button">TEXT</button></li>
            </ul>
        </nav>

		<header class="heading-section">
            <section class="title">
                <h4>Title</h4>
                <h1 id="channel-title"></h1>
            </section>
            <section class="link">
                <h4>Link</h4>
                <p class="arena-link"><a id="channel-link">See the collection on Are.na ↗</a></p>
            </section>
            <section class="description">
                <h4>Description</h4>
                <section id="channel-description"></section>
            </section>
		</header>

		<main>
			<section class="content">
				<!-- <h2>All blocks</h2> -->
				<ul id="channel-blocks"></ul>
				<p><span id="channel-count"></span>blocks</p>
			</section>
		</main>

		<footer>
			<h2>Authors</h2>
			<section id="channel-users"></section>
		</footer>
	</body>
</html>
